  <!DOCTYPE html>
  <html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Manage Contacts</title>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-avatar">You</div>
      <div>
        <div class="header-title">Your Contacts</div>
        <div class="header-status">Manage your chat contacts</div>
      </div>
      <button class="add-contact-btn">+</button>
    </header>

    <div class="main">
      <!-- Sidebar Contacts -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Cari kontak atau mulai chat baru..." />
            <button class="sidebar-btn" onclick="openNewContactForm()">
              <i class="fas fa-user-plus"></i>
            </button>
          </div>
        </div>  
        <div class="contacts-list" id="contactsList">
          <!-- Contacts loaded by JS -->
        </div>
      </aside>

      <!-- Chat Area -->
      <section class="chat-area" id="chatArea">
        <header class="chat-header">
          <div class="chat-header-back" onclick="backToContacts()">
            <i class="fas fa-arrow-left"></i>
          </div>
          <div class="chat-header-avatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatTitle" style="color: white;">Pilih kontak</div>
            <div class="chat-header-status" id="chatStatus" style="color: white;">Klik kontak untuk chat</div>
          </div>
          <div class="chat-header-actions">
            <button class="chat-header-btn" onclick="toggleChatOptions()">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </header>
        <div class="chat-messages" id="chatMessages" style="color: white;">
          <div style="text-align: center; color: #8696a0; margin-top: 100px;">
            Pilih kontak untuk memulai chat
          </div>
        </div>
        <div class="chat-input">
          <button class="chat-input-btn" onclick="attachFile()">
            <i class="fas fa-paperclip"></i>
          </button>
          <input type="text" placeholder="Ketik pesan..." id="messageInput" />
          <button class="chat-input-btn" onclick="toggleEmoji()">
            <i class="fas fa-smile"></i>
          </button>
          <button id="sendBtn">➤</button>
        </div>
      </section>
    </div>

    <!-- Chat Options Menu -->
    <div class="chat-options-menu" id="chatOptionsMenu">
      <button onclick="viewContactInfo()">
        <i class="fas fa-info-circle"></i>
        <span>Lihat Info Kontak</span>
      </button>
      <button onclick="clearChat()">
        <i class="fas fa-trash"></i>
        <span>Hapus Chat</span>
      </button>
      <button onclick="muteNotifications()">
        <i class="fas fa-bell-slash"></i>
        <span>Bisukan Notifikasi</span>
      </button>
      <button onclick="blockContact()">
        <i class="fas fa-ban"></i>
        <span>Blokir Kontak</span>
      </button>
      <button onclick="deleteCurrentContact()">
        <i class="fas fa-user-times"></i>
        <span>Hapus Kontak</span>
      </button>
    </div>

    
    <!-- Add/Edit Contact Overlay -->
    <div class="overlay" id="contactOverlay">
      <div class="form-card">
        <h2 id="formTitle" style="color: white; text-align: center; font-family: TimesNewRoman;">Tambah Kontak</h2>
        <form id="contactForm">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label style="color: white; font-family: TimesNewRoman;">Nama</label>   
            <input type="text" id="contactName" required />
          </div>
          <div class="form-group">
            <label style="color: white; font-family: TimesNewRoman;">Nomor Telepon</label>
            <input type="tel" id="contactPhone" placeholder="+62..." required />
          </div>
          <div class="form-group">
            <label style="color: white; font-family: TimesNewRoman;">Status</label>
            <select id="contactStatus">
              <option value="online">Online</option>
              <option value="offline">Offline</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Batal</button>
            <button type="submit" class="btn btn-primary">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
  </html>
